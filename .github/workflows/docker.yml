name: AllergyLab CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: docker build web-app
      run: docker build ./app -t kagaju12/al-app:latest
    - name: docker build db-loader
      run: docker build ./db-loader -t kagaju12/al-db-loader:latest
    - name: docker build email
      run: docker build ./email -t kagaju12/al-email:latest





